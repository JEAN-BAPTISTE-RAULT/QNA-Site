id: neshama_registration
title: Registration
description: '<p>Neshama registration form</p>'
categories: {  }
elements: |-
  identity:
    '#type': webform_section
    '#title': 'My contact details'
    flexbox:
      '#type': webform_flexbox
      title:
        '#type': select
        '#title': Title
        '#description': '<p>Title*</p>'
        '#title_display': invisible
        '#description_display': before
        '#options':
          mr: Mr.
          ms: Ms.
        '#required': true
      date_of_birth:
        '#type': date
        '#title': 'Date of birth'
        '#description': '<p>Date of birth*</p>'
        '#title_display': invisible
        '#description_display': before
        '#required': true
    flexbox_01:
      '#type': webform_flexbox
      first_name:
        '#type': textfield
        '#title': 'First name'
        '#description': '<p>First name*</p>'
        '#title_display': invisible
        '#description_display': before
        '#required': true
      last_name:
        '#type': textfield
        '#title': 'Last name'
        '#description': '<p>Last name*</p>'
        '#title_display': invisible
        '#description_display': before
        '#required': true
    flexbox_02:
      '#type': webform_flexbox
      email_address:
        '#type': email
        '#title': 'Email address'
        '#description': '<p>Email address*</p>'
        '#title_display': invisible
        '#description_display': before
        '#required': true
      country:
        '#type': select
        '#title': Country
        '#description': '<p>Country*</p>'
        '#title_display': invisible
        '#description_display': before
        '#options':
          Croatia: Croatia
          France: France
          Germany: Germany
          Greece: Greece
          Poland: Poland
        '#required': true
  my_personal_details:
    '#type': webform_section
    '#title': 'My personal data'
    intro:
      '#type': webform_markup
      '#markup': "<p>Here’s a chance to introduce yourself to the other Neshama participants !<br>Please write a short self-introduction using bullet points for clarity. You can include things like :</p><ul><li>Your favorite hobbies,</li><li>Your future study plans,</li><li>Languages you speak,</li><li>Your favorite book/ movie/ song,</li><li>A fun fact about yourself,</li><li>Why you wanted to join Neshama,</li><li>Etc</li></ul><p>And anything else you'd like to share — so that the other Young Ambassadors can get to know you better 😊</p>"
    about_me:
      '#type': textarea
      '#title': 'About me'
      '#description': '<p>About me (1000 characters max)*</p>'
      '#title_display': invisible
      '#description_display': before
      '#maxlength': 1000
      '#required': true
    profile_picture:
      '#type': webform_image_file
      '#title': 'Profile picture'
      '#title_display': invisible
      '#description_display': before
      '#required': true
      '#file_help': none
      '#file_placeholder': '<p><span style="white-space:pre-wrap;">Upload my picture (jpg - 5 MB max)*</span></p>'
      '#max_filesize': '5'
      '#file_extensions': 'jpg jpeg'
  personal_data:
    '#type': checkbox
    '#title': 'I agree to share <a href="/personal-data" target="_blank">my personal data</a>  with Neshama partners'
    '#required': true
  captcha:
    '#type': captcha
  actions:
    '#type': webform_actions
    '#title': 'Submit button(s)'
    '#submit__label': Submit
  legals:
    '#type': webform_markup
    '#markup': '<p>* Required fields</p><p><span style="white-space:pre-wrap;">Neshama is the data controller of your data. We collect and process your data to manage our relationship with you. We retain your data for a period of 3 years after our last contact with you.</span></p><p><span style="white-space:pre-wrap;">In accordance with the French Data Protection Act of 6 January 1978, as amended, and the GDPR of 27 April 2016, you have the right to access, rectify, erase, object, and restrict processing. You can exercise this right by contacting the following address, attaching a document proving your identity: Shoah Memorial, 17 rue Geoffroy l''Asnier – 75004 Paris.</span></p>'
